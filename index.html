<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Number Battle Rush</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
      cursor: pointer;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ── Canvas Setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 400;
const H = 700;
canvas.width = W;
canvas.height = H;

// Scale canvas to fit screen
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Constants ───────────────────────────────────────────────────────────────
const LANE_COUNT   = 3;
const LANE_W       = W / LANE_COUNT;
const LANE_CX      = [LANE_W * 0.5, LANE_W * 1.5, LANE_W * 2.5];
const PLAYER_Y     = H * 0.76;
const GAME_SECS    = 25;
const PLAYER_R     = 28;

// Tile operator colours
const OP_STYLE = {
  '+': { fill: '#00ff88', dark: '#003319', shadow: '#00ff88' },
  '×': { fill: '#ffcc00', dark: '#3d2e00', shadow: '#ffcc00' },
  '-': { fill: '#ff5555', dark: '#3d0000', shadow: '#ff5555' },
};

// ── State ────────────────────────────────────────────────────────────────────
let state       = 'MENU'; // MENU | RUNNING | BOSS | RESULT
let playerLane  = 1;
let playerX     = LANE_CX[1];
let targetX     = LANE_CX[1];
let playerNum   = 1;
let tiles       = [];
let particles   = [];
let elapsed     = 0;
let spawnCd     = 1.0;
let roadOff     = 0;
let lastTs      = 0;

// Boss state
let bossHP      = 0;
let bossPhase   = 'intro'; // intro | compare | result
let bossTimer   = 0;
let resultWin   = false;

// Best score
let bestScore   = 0;

// ── Audio (Web Audio API — no external files) ──────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, dur, type, vol) {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol || 0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + dur);
}

function sfxCollectPlus()  { playTone(520, 0.12, 'square', 0.10); playTone(680, 0.10, 'square', 0.08); }
function sfxCollectMul()   { playTone(600, 0.08, 'sine', 0.12); playTone(800, 0.08, 'sine', 0.10); playTone(1000, 0.10, 'sine', 0.08); }
function sfxCollectMinus() { playTone(200, 0.15, 'sawtooth', 0.08); }
function sfxBossIntro()    { playTone(150, 0.3, 'square', 0.10); playTone(200, 0.3, 'square', 0.08); }
function sfxWin()          { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.12), i*100)); }
function sfxLose()         { [300,250,200,150].forEach((f,i) => setTimeout(() => playTone(f, 0.25, 'sawtooth', 0.08), i*120)); }
function sfxLaneSwitch()   { playTone(440, 0.05, 'sine', 0.06); }

// ── BGM (procedural chiptune loop) ─────────────────────────────────────────
let bgmNodes = null;

function startBGM(bpm, melody, bass, key) {
  stopBGM();
  const ctx = ensureAudio();
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.07;
  masterGain.connect(ctx.destination);

  const beatSec = 60 / bpm;
  const loopLen = melody.length * beatSec;

  // Melody oscillator (square wave — chiptune feel)
  function scheduleLoop() {
    const now = ctx.currentTime;
    // melody voice
    melody.forEach((note, i) => {
      if (note === 0) return;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = note;
      g.gain.setValueAtTime(0.5, now + i * beatSec);
      g.gain.exponentialRampToValueAtTime(0.01, now + (i + 0.9) * beatSec);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(now + i * beatSec);
      osc.stop(now + (i + 0.95) * beatSec);
    });
    // bass voice
    bass.forEach((note, i) => {
      if (note === 0) return;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = note;
      g.gain.setValueAtTime(0.4, now + i * beatSec);
      g.gain.exponentialRampToValueAtTime(0.01, now + (i + 0.9) * beatSec);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(now + i * beatSec);
      osc.stop(now + (i + 0.95) * beatSec);
    });
  }

  scheduleLoop();
  const iv = setInterval(scheduleLoop, loopLen * 1000);
  bgmNodes = { masterGain, interval: iv };
}

function stopBGM() {
  if (bgmNodes) {
    clearInterval(bgmNodes.interval);
    bgmNodes.masterGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    setTimeout(() => { try { bgmNodes.masterGain.disconnect(); } catch(e){} }, 400);
    bgmNodes = null;
  }
}

// C major pentatonic melodies
const BGM_GAME_MELODY = [523,587,659,784,659,587,523,784, 659,523,587,659,784,659,523,0];
const BGM_GAME_BASS   = [131,0,165,0,131,0,196,0, 131,0,165,0,196,0,131,0];
const BGM_BOSS_MELODY = [330,0,392,330,294,0,330,392, 330,294,262,0,294,330,0,0];
const BGM_BOSS_BASS   = [110,0,110,0,147,0,147,0, 110,0,110,0,147,0,110,0];

function startGameBGM() { startBGM(180, BGM_GAME_MELODY, BGM_GAME_BASS); }
function startBossBGM() { startBGM(140, BGM_BOSS_MELODY, BGM_BOSS_BASS); }

// ── Helpers ──────────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

function drawStar(cx, cy, r, fill, glow) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = (i * 72 - 90) * Math.PI / 180;
    const a2 = ((i * 72) + 36 - 90) * Math.PI / 180;
    ctx.lineTo(Math.cos(a1) * r, Math.sin(a1) * r);
    ctx.lineTo(Math.cos(a2) * r * 0.4, Math.sin(a2) * r * 0.4);
  }
  ctx.closePath();
  if (glow) { ctx.shadowColor = glow; ctx.shadowBlur = 16; }
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.shadowBlur = 0;
  // highlight
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = (i * 72 - 90) * Math.PI / 180;
    const a2 = ((i * 72) + 36 - 90) * Math.PI / 180;
    ctx.lineTo(Math.cos(a1) * r, Math.sin(a1) * r);
    ctx.lineTo(Math.cos(a2) * r * 0.4, Math.sin(a2) * r * 0.4);
  }
  ctx.closePath();
  ctx.strokeStyle = '#ffffff44';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

// Background floating particles for menu/result
let bgParticles = [];
function initBgParticles() {
  bgParticles = [];
  for (let i = 0; i < 40; i++) {
    bgParticles.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3, vy: -0.2 - Math.random() * 0.5,
      size: 1 + Math.random() * 2.5, alpha: 0.1 + Math.random() * 0.3,
      color: ['#4488ff', '#00ff88', '#ffcc00', '#ff5555'][Math.floor(Math.random() * 4)]
    });
  }
}
initBgParticles();

function drawBgParticles() {
  for (const p of bgParticles) {
    p.x += p.vx; p.y += p.vy;
    if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawScreenBg() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(0.5, '#0a0a22');
  bg.addColorStop(1, '#0e0830');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  drawBgParticles();
}

function drawButton(text, cx, cy, w, h, color1, color2, glowColor) {
  const bx = cx - w / 2, by = cy - h / 2;
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.003);
  ctx.save();
  ctx.shadowColor = glowColor || '#4455ff';
  ctx.shadowBlur = 14 + pulse * 6;
  const grad = ctx.createLinearGradient(bx, by, bx, by + h);
  grad.addColorStop(0, color1 || '#2244cc');
  grad.addColorStop(1, color2 || '#1122aa');
  roundRect(bx, by, w, h, 14);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#ffffff22';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;
  // text
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, cx, cy);
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── Game Logic ───────────────────────────────────────────────────────────────
function resetGame() {
  ensureAudio();
  playerLane = 1;
  playerX    = LANE_CX[1];
  targetX    = LANE_CX[1];
  playerNum  = 1;
  tiles      = [];
  particles  = [];
  elapsed    = 0;
  spawnCd    = 0.5;
  roadOff    = 0;
  state      = 'RUNNING';
  startGameBGM();
}

function spawnTile() {
  const lane = randInt(0, 2);
  // weighted: more + and ×, less -
  const roll = Math.random();
  let op, val;
  if (roll < 0.45) {
    op = '+'; val = randInt(1, 10);
  } else if (roll < 0.75) {
    op = '×'; val = randInt(2, 4);
  } else {
    op = '-'; val = randInt(1, 6);
  }
  tiles.push({ lane, x: LANE_CX[lane], y: -50, op, val, alpha: 1, scale: 1, dead: false });
}

function applyTile(t) {
  if (t.op === '+') { playerNum += t.val; sfxCollectPlus(); }
  else if (t.op === '×') { playerNum *= t.val; sfxCollectMul(); }
  else { playerNum = Math.max(1, playerNum - t.val); sfxCollectMinus(); }
  playerNum = Math.min(playerNum, 99999);

  // burst particles
  const style = OP_STYLE[t.op];
  for (let i = 0; i < 10; i++) {
    const angle = (Math.random() * Math.PI * 2);
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: t.x, y: t.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      color: style.fill,
      life: 1,
      size: 3 + Math.random() * 4,
    });
  }
}

function startBoss() {
  // Boss HP is somewhat competitive with player
  bossHP    = Math.floor(playerNum * (0.6 + Math.random() * 0.8) + randInt(20, 80));
  bossHP    = clamp(bossHP, 10, 99999);
  bossPhase = 'intro';
  bossTimer = 0;
  tiles     = [];
  particles = [];
  state     = 'BOSS';
  sfxBossIntro();
  startBossBGM();
}

function updateRunning(dt) {
  elapsed += dt;
  roadOff  = (roadOff + 280 * dt) % 60;

  // Smooth lane transition
  playerX = lerp(playerX, targetX, 0.18);

  // Spawn
  spawnCd -= dt;
  if (spawnCd <= 0) {
    spawnTile();
    spawnCd = Math.max(0.35, 1.0 - elapsed * 0.018);
  }

  // Tile update
  const speed = 220 + elapsed * 4;
  for (let i = tiles.length - 1; i >= 0; i--) {
    const t = tiles[i];
    if (t.dead) {
      t.scale += 3.5 * dt;
      t.alpha -= 4 * dt;
      if (t.alpha <= 0) { tiles.splice(i, 1); continue; }
      continue;
    }
    t.y += speed * dt;

    // Collect check
    if (Math.abs(t.y - PLAYER_Y) < 38 && Math.abs(t.x - playerX) < 42) {
      t.dead = true;
      applyTile(t);
    }

    if (t.y > H + 60) tiles.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.12;
    p.life -= 2.2 * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (elapsed >= GAME_SECS) startBoss();
}

function updateBoss(dt) {
  bossTimer += dt;
  if (bossPhase === 'intro'   && bossTimer > 1.8) { bossPhase = 'compare'; bossTimer = 0; }
  if (bossPhase === 'compare' && bossTimer > 1.8) { bossPhase = 'result';  bossTimer = 0; resultWin = playerNum >= bossHP; if (resultWin) sfxWin(); else sfxLose(); }
  if (bossPhase === 'result'  && bossTimer > 2.5) {
    bestScore = Math.max(bestScore, playerNum);
    state = 'RESULT';
    stopBGM();
  }
}

// ── Input ────────────────────────────────────────────────────────────────────
function moveLane(dir) {
  if (state !== 'RUNNING') return;
  const prev = playerLane;
  playerLane = clamp(playerLane + dir, 0, 2);
  targetX    = LANE_CX[playerLane];
  if (playerLane !== prev) sfxLaneSwitch();
}

function tapLane(canvasX) {
  if (state !== 'RUNNING') return;
  const prev = playerLane;
  playerLane = clamp(Math.floor(canvasX / LANE_W), 0, 2);
  targetX    = LANE_CX[playerLane];
  if (playerLane !== prev) sfxLaneSwitch();
}

document.addEventListener('keydown', e => {
  if (state === 'MENU')   { resetGame(); return; }
  if (state === 'RESULT') { state = 'MENU'; return; }
  if (state !== 'RUNNING') return;
  if (e.key === 'ArrowLeft')  moveLane(-1);
  if (e.key === 'ArrowRight') moveLane(+1);
});

let touchSX = 0;
canvas.addEventListener('touchstart', e => {
  touchSX = e.touches[0].clientX;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchSX;
  if (state === 'MENU')   { resetGame(); return; }
  if (state === 'RESULT') { state = 'MENU'; return; }
  if (state !== 'RUNNING') return;

  if (Math.abs(dx) < 25) {
    const rect   = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const cx     = (e.changedTouches[0].clientX - rect.left) * scaleX;
    tapLane(cx);
  } else {
    moveLane(dx < 0 ? -1 : 1);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('click', e => {
  if (state === 'MENU')   { resetGame(); return; }
  if (state === 'RESULT') { state = 'MENU'; return; }
  if (state !== 'RUNNING') return;
  const rect   = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const cx     = (e.clientX - rect.left) * scaleX;
  tapLane(cx);
});

// ── Draw helpers ─────────────────────────────────────────────────────────────
function drawRoad() {
  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#080818');
  bg.addColorStop(1, '#0e0e2a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Lane dividers (dashed)
  ctx.save();
  ctx.strokeStyle = '#2233557a';
  ctx.lineWidth = 2;
  ctx.setLineDash([18, 18]);
  for (let i = 1; i < LANE_COUNT; i++) {
    ctx.lineDashOffset = -roadOff;
    ctx.beginPath();
    ctx.moveTo(i * LANE_W, 0);
    ctx.lineTo(i * LANE_W, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();

  // Road speed lines
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 3;
  for (let y = (-roadOff % 60) - 60; y < H; y += 60) {
    for (let lx of LANE_CX) {
      ctx.beginPath();
      ctx.moveTo(lx, y);
      ctx.lineTo(lx, y + 28);
      ctx.stroke();
    }
  }

  // Side glow borders
  const borderGrad = ctx.createLinearGradient(0, 0, 0, H);
  borderGrad.addColorStop(0, '#4455ff');
  borderGrad.addColorStop(1, '#220044');
  ctx.strokeStyle = borderGrad;
  ctx.lineWidth = 4;
  ctx.shadowColor = '#4455ff';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(2, 0); ctx.lineTo(2, H);
  ctx.moveTo(W - 2, 0); ctx.lineTo(W - 2, H);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawTile(t) {
  const s = OP_STYLE[t.op];
  ctx.save();
  ctx.globalAlpha = t.alpha;
  ctx.translate(t.x, t.y);
  ctx.scale(t.scale, t.scale);

  const tw = 74, th = 50;
  ctx.shadowColor = s.shadow;
  ctx.shadowBlur  = 16;

  // Outer shape
  roundRect(-tw / 2, -th / 2, tw, th, 12);
  const tileGrad = ctx.createLinearGradient(0, -th / 2, 0, th / 2);
  tileGrad.addColorStop(0, s.dark);
  tileGrad.addColorStop(1, '#000000');
  ctx.fillStyle = tileGrad;
  ctx.fill();
  ctx.strokeStyle = s.fill;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner highlight
  ctx.shadowBlur = 0;
  roundRect(-tw / 2 + 3, -th / 2 + 3, tw - 6, th / 2 - 3, 8);
  ctx.fillStyle = s.fill + '10';
  ctx.fill();

  ctx.fillStyle = s.fill;
  ctx.font = 'bold 24px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${t.op}${t.val}`, 0, 1);

  ctx.restore();
}

function drawPlayer() {
  ctx.save();
  ctx.translate(playerX, PLAYER_Y);

  // Pulse ring
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.004);
  ctx.strokeStyle = `rgba(100,200,255,${0.2 + 0.2 * pulse})`;
  ctx.lineWidth = 2;
  ctx.shadowColor = '#44aaff';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.arc(0, 0, PLAYER_R + 8 + pulse * 6, 0, Math.PI * 2);
  ctx.stroke();

  // Body
  const grad = ctx.createRadialGradient(0, -6, 4, 0, 0, PLAYER_R);
  grad.addColorStop(0, '#88eeff');
  grad.addColorStop(1, '#0055cc');
  ctx.fillStyle = grad;
  ctx.shadowColor = '#00aaff';
  ctx.shadowBlur = 22;
  ctx.beginPath();
  ctx.arc(0, 0, PLAYER_R, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#aaddff';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 0;
  ctx.stroke();

  // Number inside
  const numStr = String(playerNum);
  const fs = numStr.length >= 5 ? 12 : numStr.length >= 4 ? 14 : numStr.length >= 3 ? 16 : 20;
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${fs}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(numStr, 0, 0);

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life * 0.9;
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawHUD() {
  // Timer bar bg with rounded pill
  const bx = 20, by = 16, bw = W - 40, bh = 14;
  ctx.fillStyle = '#0a0a25';
  ctx.strokeStyle = '#2a2a5a';
  ctx.lineWidth = 1;
  roundRect(bx, by, bw, bh, 7);
  ctx.fill();
  ctx.stroke();

  const progress = clamp(1 - elapsed / GAME_SECS, 0, 1);
  const barColor = progress > 0.5 ? '#00ff88' : progress > 0.25 ? '#ffcc00' : '#ff5555';
  if (progress > 0) {
    const barGrad = ctx.createLinearGradient(bx, 0, bx + bw * progress, 0);
    barGrad.addColorStop(0, barColor);
    barGrad.addColorStop(1, barColor + 'aa');
    ctx.fillStyle = barGrad;
    ctx.shadowColor = barColor;
    ctx.shadowBlur = 10;
    roundRect(bx, by, bw * progress, bh, 7);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Countdown text inside bar
  const secsLeft = Math.ceil(clamp(GAME_SECS - elapsed, 0, GAME_SECS));
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${secsLeft}s`, bx + bw / 2, by + bh / 2);

  // Player number panel (top left, rounded card)
  const px = 12, py = 38, pw = 120, ph = 44;
  ctx.fillStyle = '#0d0d30cc';
  roundRect(px, py, pw, ph, 10);
  ctx.fill();
  ctx.strokeStyle = '#4488ff44';
  ctx.lineWidth = 1.5;
  roundRect(px, py, pw, ph, 10);
  ctx.stroke();

  ctx.fillStyle = '#4488ff';
  ctx.font = '10px Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('MY NUMBER', px + 12, py + 6);

  const numStr = String(playerNum);
  const fs = numStr.length >= 5 ? 18 : numStr.length >= 4 ? 22 : 26;
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#4488ff';
  ctx.shadowBlur = 8;
  ctx.font = `bold ${fs}px Arial`;
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(numStr, px + 12, py + 38);
  ctx.shadowBlur = 0;

  // Lane indicator dots (bottom)
  const ly = H - 40;
  for (let i = 0; i < LANE_COUNT; i++) {
    const dx = LANE_CX[i];
    ctx.beginPath();
    ctx.arc(dx, ly, i === playerLane ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = i === playerLane ? '#4488ff' : '#ffffff20';
    if (i === playerLane) { ctx.shadowColor = '#4488ff'; ctx.shadowBlur = 8; }
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawMenu() {
  drawScreenBg();

  // Faint lane lines
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 1;
  for (let i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(i * LANE_W, 0);
    ctx.lineTo(i * LANE_W, H);
    ctx.stroke();
  }

  ctx.save();
  ctx.textAlign = 'center';

  // Title with bounce
  const bounce = Math.sin(Date.now() * 0.002) * 3;

  ctx.shadowColor = '#00aaff';
  ctx.shadowBlur = 35;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 38px Arial';
  ctx.fillText('NUMBER BATTLE', W / 2, 150 + bounce);
  ctx.shadowBlur = 0;

  // "RUSH!" with gradient-like double render
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 56px Arial';
  ctx.fillText('RUSH!', W / 2, 215 + bounce);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffe866';
  ctx.font = 'bold 56px Arial';
  ctx.fillText('RUSH!', W / 2, 214 + bounce);

  // Divider line
  ctx.strokeStyle = '#ffffff15';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, 245); ctx.lineTo(W - 80, 245);
  ctx.stroke();

  // Subtitle
  ctx.fillStyle = '#9999cc';
  ctx.font = '15px Arial';
  ctx.fillText('타일을 수집해 숫자를 키워라!', W / 2, 275);
  ctx.fillStyle = '#7777aa';
  ctx.font = '14px Arial';
  ctx.fillText('25초 후 보스를 이기면 승리!', W / 2, 298);

  // Tile preview with labels
  const ops = [
    { op: '+', val: 5, x: W / 2 - 100, label: '증가' },
    { op: '×', val: 3, x: W / 2, label: '배수' },
    { op: '-', val: 2, x: W / 2 + 100, label: '감소' },
  ];
  for (const o of ops) {
    const s = OP_STYLE[o.op];
    ctx.save();
    ctx.translate(o.x, 365);
    ctx.shadowColor = s.shadow;
    ctx.shadowBlur = 12;
    roundRect(-36, -26, 72, 52, 10);
    ctx.fillStyle = s.dark;
    ctx.fill();
    ctx.strokeStyle = s.fill;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = s.fill;
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${o.op}${o.val}`, 0, 0);
    // label below
    ctx.fillStyle = s.fill + '88';
    ctx.font = '11px Arial';
    ctx.textBaseline = 'top';
    ctx.fillText(o.label, 0, 32);
    ctx.restore();
  }

  // Controls
  ctx.fillStyle = '#555577';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('← → 키  |  탭  |  스와이프', W / 2, 430);

  // Best score
  if (bestScore > 0) {
    ctx.fillStyle = '#ffcc0088';
    ctx.font = '13px Arial';
    ctx.fillText(`🏆 최고 기록: ${bestScore}`, W / 2, 455);
  }

  // Start button
  drawButton('START', W / 2, 510, 200, 56, '#1a44dd', '#0f22aa', '#4466ff');

  // Tap hint
  const hintAlpha = 0.3 + 0.3 * Math.sin(Date.now() * 0.004);
  ctx.globalAlpha = hintAlpha;
  ctx.fillStyle = '#8888bb';
  ctx.font = '12px Arial';
  ctx.fillText('TAP TO START', W / 2, 560);
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawBoss() {
  // Dark bg
  ctx.fillStyle = '#080812';
  ctx.fillRect(0, 0, W, H);

  const t = bossTimer;
  const bob = Math.sin(Date.now() * 0.003) * 6;

  // BOSS! title
  ctx.save();
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff2222';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ff5555';
  ctx.font = 'bold 52px Arial';
  ctx.fillText('BOSS!!', W / 2, 80);
  ctx.shadowBlur = 0;

  // Boss face
  const bx = W / 2, by2 = 210 + bob;
  // Body
  const bodyGrad = ctx.createRadialGradient(bx - 15, by2 - 20, 10, bx, by2, 75);
  bodyGrad.addColorStop(0, '#550011');
  bodyGrad.addColorStop(1, '#220008');
  ctx.fillStyle = bodyGrad;
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 35;
  ctx.beginPath();
  ctx.arc(bx, by2, 75, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Eyes
  ctx.fillStyle = '#ff2200';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 15;
  ctx.beginPath(); ctx.ellipse(bx - 22, by2 - 18, 14, 10, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + 22, by2 - 18, 14, 10, 0, 0, Math.PI * 2); ctx.fill();
  // Pupils
  ctx.fillStyle = '#ffff00';
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(bx - 20, by2 - 18, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + 24, by2 - 18, 5, 0, Math.PI * 2); ctx.fill();
  // Mouth
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(bx, by2 + 15, 28, 0.15 * Math.PI, 0.85 * Math.PI);
  ctx.stroke();

  // HP number inside boss
  ctx.fillStyle = '#ffcccc';
  ctx.font = `bold ${String(bossHP).length >= 5 ? 20 : 26}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(bossHP, bx, by2 + 28);

  // HP label
  ctx.fillStyle = '#ff8888';
  ctx.font = '16px Arial';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('BOSS HP', bx, by2 + 85);

  // Phase: compare
  if (bossPhase !== 'intro') {
    const showProgress = Math.min(1, t / 0.5);

    // VS text
    ctx.globalAlpha = showProgress;
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 10;
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('VS', W / 2, H / 2 + 30);
    ctx.shadowBlur = 0;

    // Player bubble
    const py = H / 2 + 110;
    const pgrad = ctx.createRadialGradient(W / 2 - 15, py - 20, 5, W / 2, py, 52);
    pgrad.addColorStop(0, '#88eeff');
    pgrad.addColorStop(1, '#0055cc');
    ctx.fillStyle = pgrad;
    ctx.shadowColor = '#00aaff';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(W / 2, py, 52, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#aaddff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    const ns = String(playerNum);
    const fs = ns.length >= 5 ? 16 : ns.length >= 4 ? 20 : ns.length >= 3 ? 24 : 28;
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${fs}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(playerNum, W / 2, py);

    ctx.fillStyle = '#88aaff';
    ctx.font = '16px Arial';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('내 숫자', W / 2, py + 68);
    ctx.globalAlpha = 1;
  }

  // Phase: result
  if (bossPhase === 'result') {
    const win = playerNum >= bossHP;
    ctx.shadowColor = win ? '#00ff88' : '#ff5555';
    ctx.shadowBlur  = 35;
    ctx.fillStyle   = win ? '#00ff88' : '#ff5555';
    ctx.font = 'bold 58px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(win ? '승리!' : '패배...', W / 2, H - 60);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawResult() {
  drawScreenBg();

  ctx.save();
  ctx.textAlign = 'center';

  const bounce = Math.sin(Date.now() * 0.003) * 2;

  if (resultWin) {
    // WIN title
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 74px Arial';
    ctx.fillText('WIN!', W / 2, 120 + bounce);
    ctx.shadowBlur = 0;
    // Lighter overlay
    ctx.fillStyle = '#88ffbb';
    ctx.font = 'bold 74px Arial';
    ctx.fillText('WIN!', W / 2, 119 + bounce);

    // Custom stars with animation
    const starY = 185;
    const starPulse = 0.9 + 0.1 * Math.sin(Date.now() * 0.005);
    drawStar(W / 2 - 70, starY, 28 * starPulse, '#ffd700', '#ffaa00');
    drawStar(W / 2, starY - 8, 32 * starPulse, '#ffd700', '#ffaa00');
    drawStar(W / 2 + 70, starY, 28 * starPulse, '#ffd700', '#ffaa00');
  } else {
    ctx.shadowColor = '#ff5555';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#ff5555';
    ctx.font = 'bold 64px Arial';
    ctx.fillText('LOSE...', W / 2, 130 + bounce);
    ctx.shadowBlur = 0;

    // Dim stars
    const starY = 185;
    drawStar(W / 2 - 70, starY, 24, '#333344', null);
    drawStar(W / 2, starY - 5, 28, '#333344', null);
    drawStar(W / 2 + 70, starY, 24, '#333344', null);
  }

  // Score card
  const boxX = 35, boxY = 225, boxW = W - 70, boxH = 220;
  // Card bg with subtle gradient
  const cardGrad = ctx.createLinearGradient(boxX, boxY, boxX, boxY + boxH);
  cardGrad.addColorStop(0, '#12123a');
  cardGrad.addColorStop(1, '#0a0a28');
  roundRect(boxX, boxY, boxW, boxH, 16);
  ctx.fillStyle = cardGrad;
  ctx.fill();
  ctx.strokeStyle = resultWin ? '#00ff8833' : '#ff555533';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inner top accent line
  ctx.strokeStyle = resultWin ? '#00ff8822' : '#ff555522';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(boxX + 20, boxY + 1);
  ctx.lineTo(boxX + boxW - 20, boxY + 1);
  ctx.stroke();

  // My number section
  ctx.fillStyle = '#6688cc';
  ctx.font = '12px Arial';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('MY NUMBER', W / 2, boxY + 35);

  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#4488ff';
  ctx.shadowBlur = 8;
  ctx.font = 'bold 42px Arial';
  ctx.fillText(playerNum, W / 2, boxY + 82);
  ctx.shadowBlur = 0;

  // Divider
  ctx.strokeStyle = '#ffffff10';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(boxX + 30, boxY + 100);
  ctx.lineTo(boxX + boxW - 30, boxY + 100);
  ctx.stroke();

  // Boss HP section
  ctx.fillStyle = '#cc6666';
  ctx.font = '12px Arial';
  ctx.fillText('BOSS HP', W / 2, boxY + 125);
  ctx.fillStyle = '#ff8888';
  ctx.font = 'bold 32px Arial';
  ctx.fillText(bossHP, W / 2, boxY + 162);

  // Diff badge
  const diff = playerNum - bossHP;
  const diffColor = diff >= 0 ? '#00ff88' : '#ff5555';
  const diffText = diff >= 0 ? `+${diff} 승리!` : `${diff} 패배`;
  const badgeW = 160, badgeH = 28;
  roundRect(W / 2 - badgeW / 2, boxY + 175, badgeW, badgeH, 14);
  ctx.fillStyle = diffColor + '20';
  ctx.fill();
  ctx.strokeStyle = diffColor + '44';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = diffColor;
  ctx.font = 'bold 14px Arial';
  ctx.textBaseline = 'middle';
  ctx.fillText(diffText, W / 2, boxY + 189);

  // Best score
  if (bestScore > 0) {
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#ffcc0077';
    ctx.font = '13px Arial';
    ctx.fillText(`🏆 최고 기록: ${bestScore}`, W / 2, boxY + boxH + 30);
  }

  // Retry button
  const btnColor = resultWin ? '#117744' : '#1a1a55';
  const btnColor2 = resultWin ? '#0a5533' : '#111144';
  const btnGlow = resultWin ? '#00ff88' : '#4466ff';
  drawButton('다시 하기', W / 2, H - 90, 210, 56, btnColor, btnColor2, btnGlow);

  // Tap hint
  const hintAlpha = 0.3 + 0.3 * Math.sin(Date.now() * 0.004);
  ctx.globalAlpha = hintAlpha;
  ctx.fillStyle = '#8888bb';
  ctx.font = '11px Arial';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('TAP TO CONTINUE', W / 2, H - 45);
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ── Main Loop ────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if      (state === 'MENU')    drawMenu();
  else if (state === 'RUNNING') { updateRunning(dt); drawRoad(); tiles.forEach(drawTile); drawParticles(); drawPlayer(); drawHUD(); }
  else if (state === 'BOSS')    { updateBoss(dt); drawBoss(); }
  else if (state === 'RESULT')  drawResult();

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
